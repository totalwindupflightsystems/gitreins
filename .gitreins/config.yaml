guards:
  secrets: true
  lint: true
  tests: true
  test_mode: diff
  test_command: pytest -x --tb=short
  test_timeout: 120
  dead_code: false
  skylos: false
  static_analysis: true
evaluator:
  max_iterations: 100
  max_time: 30m
  max_input_tokens: 10M
  max_output_tokens: 1M
  tool_call_weight: 0.1
defaults:
  model: deepseek-v4-flash
history:
  enabled: true
  storage: git
  max_verdicts: 1000

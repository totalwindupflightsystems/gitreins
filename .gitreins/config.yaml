guards:
  secrets: true
  lint: true
  tests: true
  test_mode: diff
  test_command: pytest -x --tb=short
  test_timeout: 120
  dead_code: false
  skylos: false
evaluator:
  max_iterations: 50
  max_time: 10m
  max_input_tokens: 1M
  max_output_tokens: 0.1M
  tool_call_weight: 0.1
defaults:
  model: deepseek-v4-pro
history:
  enabled: true
  storage: git
  max_verdicts: 1000

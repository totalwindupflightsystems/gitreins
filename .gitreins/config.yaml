guards:
  secrets: true
  lint: true
  tests: true
  test_mode: diff
  test_command: uv run pytest -x --tb=short
  test_timeout: 360
  dead_code: false
  skylos: false
  static_analysis: true
  static_analysis_tools:
    python:
    - mypy
  lsp: true
  lsp_tools:
  - pylsp
evaluator:
  max_iterations: 100
  max_time: 30m
  max_input_tokens: 10M
  max_output_tokens: 1M
  tool_call_weight: 0.1
  compaction_threshold: 0.9
  code_context_budget: 0.7
  file_scope: changed
  fast_track: auto
defaults:
  model: deepseek-v4-flash
history:
  enabled: true
  storage: git
  max_verdicts: 1000

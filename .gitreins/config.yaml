guards:
  secrets: true
  lint: true
  tests: true
  test_mode: diff
  test_command: pytest -x --tb=short
  test_timeout: 180
  dead_code: false
  skylos: false
  # The inherited codebase is not yet type-clean; CI covers the static-analysis
  # runner contract while release guards retain secrets, lint, tests, and LSP.
  static_analysis: false
  static_analysis_tools:
    python:
    - mypy
  lsp: true
  lsp_tools:
  - pylsp
evaluator:
  max_iterations: 100
  max_time: 30m
  max_input_tokens: 10M
  max_output_tokens: 1M
  tool_call_weight: 0.1
  compaction_threshold: 0.9
  code_context_budget: 0.7
  file_scope: changed
defaults:
  model: deepseek-v4-flash
history:
  enabled: true
  storage: git
  max_verdicts: 1000

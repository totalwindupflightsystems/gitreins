# GitReins gitleaks configuration
# Extends default gitleaks ruleset with project-specific allowlists.
[extend]
useDefault = true

# Catch all sk- prefixed API keys (OpenAI, OpenRouter, DeepSeek, etc.)
[[rules]]
id = "sk-api-key"
description = "OpenAI/OpenRouter/DeepSeek API key (sk- prefix)"
regex = '''(?i)sk-[a-zA-Z0-9_-]{20,}'''

[allowlist]
description = "GitReins project allowlists — test fixtures, documentation, and build artifacts"

# Test files with embedded fake secrets for scanner testing
paths = [
  '''tests/test_secrets_scanner\.py''',
  '''tests/test_guard_manager\.py''',
  '''tests/test_cli\.py''',
  '''tests/test_secrets_completeness\.py''',
  '''tests/test_guard_exit\.py''',
  '''tests/test_config_priority\.py''',
  '''tests/fixtures/secrets/.*''',
  '''\.hermes/.*''',
  '''tests/reliability/secret-leak/.*''',
  '''tests/__pycache__/.*''',
  '''\.memory-bank/.*''',
  '''__pycache__/.*''',
  '''\.env''',
  '''\.gitreins-sandbox/.*''',
]
